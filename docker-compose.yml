services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - db_data:/data
    environment:
      SECRET_KEY: dev-secret-key-change-in-production
      DATABASE_URL: sqlite+aiosqlite:////data/health_app.db
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
